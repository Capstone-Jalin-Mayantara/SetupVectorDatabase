# Nginx reverse proxy + SSL untuk ASIQ API
#
# CARA INSTALL:
#   1. Install nginx dan certbot:
#        sudo apt install nginx certbot python3-certbot-nginx -y
#
#   2. Copy file ini:
#        sudo cp /home/ubuntu/SetupVectorDatabase/deploy/nginx.conf /etc/nginx/sites-available/asiq
#        sudo ln -s /etc/nginx/sites-available/asiq /etc/nginx/sites-enabled/
#        sudo rm /etc/nginx/sites-enabled/default   (hapus default kalau ada)
#
#   3. Ganti DOMAIN_KAMU di bawah dengan domain asli (misal: api.asiq.jalin.id):
#        sudo sed -i 's/DOMAIN_KAMU/api.asiq.jalin.id/g' /etc/nginx/sites-available/asiq
#
#   4. Test dan reload nginx:
#        sudo nginx -t && sudo systemctl reload nginx
#
#   5. Generate sertifikat SSL via Let's Encrypt (GRATIS):
#        sudo certbot --nginx -d api.asiq.jalin.id
#        (certbot otomatis mengisi ssl_certificate di bawah)
#
#   6. Cek auto-renewal:
#        sudo systemctl status certbot.timer
#
# Setelah ini API bisa diakses lewat: https://DOMAIN_KAMU/docs

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name DOMAIN_KAMU;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS endpoint
server {
    listen 443 ssl http2;
    server_name DOMAIN_KAMU;

    # SSL — diisi otomatis oleh certbot
    ssl_certificate     /etc/letsencrypt/live/DOMAIN_KAMU/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/DOMAIN_KAMU/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options        "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header X-XSS-Protection       "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Upload limit untuk file materi (.pdf/.docx)
    client_max_body_size 20M;

    # Timeout diperpanjang — pipeline AI bisa butuh beberapa menit
    proxy_read_timeout    600s;
    proxy_connect_timeout 60s;
    proxy_send_timeout    600s;

    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";

        # WebSocket support (untuk streaming status di masa depan)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Batasi akses endpoint admin hanya dari IP tertentu (opsional)
    # location /api/admin/ {
    #     allow 203.0.113.1;   # IP kantor Jalin
    #     deny all;
    #     proxy_pass http://127.0.0.1:8000;
    # }

    # Log
    access_log /var/log/nginx/asiq_access.log;
    error_log  /var/log/nginx/asiq_error.log;
}
